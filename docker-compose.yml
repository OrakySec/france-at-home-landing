version: '3.8'

services:
  landing-page:
    image: ghcr.io/orakysec/france-at-home-landing:latest
    networks:
      - YkaroNET
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=YkaroNET"
        - "traefik.http.routers.france-at-home.rule=Host(`franceathome.ykaromarques.com`)"
        - "traefik.http.routers.france-at-home.entrypoints=websecure"
        - "traefik.http.routers.france-at-home.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.france-at-home.priority=1"
        - "traefik.http.services.france-at-home.loadbalancer.server.port=80"

  tracker:
    image: ghcr.io/orakysec/france-tracker:latest
    environment:
      - TRACKER_PASSWORD=franceathome2026
    volumes:
      - ./tracker/data:/app/data
    networks:
      - YkaroNET
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=YkaroNET"
        - "traefik.http.routers.france-tracker.rule=Host(`franceathome.ykaromarques.com`) && (PathPrefix(`/rastreio`) || PathPrefix(`/api`))"
        - "traefik.http.routers.france-tracker.entrypoints=websecure"
        - "traefik.http.routers.france-tracker.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.tracker-strip.stripprefix.prefixes=/rastreio"
        - "traefik.http.routers.france-tracker.middlewares=tracker-strip"
        - "traefik.http.routers.france-tracker.priority=100"
        - "traefik.http.services.france-tracker.loadbalancer.server.port=3001"

networks:
  YkaroNET:
    external: true

volumes:
  tracker_data:
